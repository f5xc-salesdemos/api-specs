---
# F5 XC API Spec Validation Configuration

# API Configuration
api:
  base_url: "https://example-tenant.console.ves.volterra.io"
  tenant: "example-tenant"
  namespace: "example-namespace"
  timeout: 30
  retries: 3
  retry_delay: 2

# Spec Download Configuration
download:
  url: "https://docs.cloud.f5.com/docs-v2/downloads/f5-distributed-cloud-open-api.zip"
  output_dir: "specs/original"
  etag_cache: ".etag_cache"

# Validation Categories (all 10 from OpenAPI spec)
validation_categories:
  string_length:
    enabled: true
    keywords: ["minLength", "maxLength"]
    description: "Validate string length boundaries"

  pattern:
    enabled: true
    keywords: ["pattern"]
    description: "Validate regex pattern matching"

  numeric_bounds:
    enabled: true
    keywords: ["minimum", "maximum", "exclusiveMinimum", "exclusiveMaximum"]
    description: "Validate numeric range boundaries"

  required_fields:
    enabled: true
    keywords: ["required"]
    description: "Validate required field presence"

  enum_values:
    enabled: true
    keywords: ["enum"]
    description: "Validate enumeration constraints"

  array_bounds:
    enabled: true
    keywords: ["minItems", "maxItems", "uniqueItems"]
    description: "Validate array size and uniqueness"

  object_structure:
    enabled: true
    keywords: ["additionalProperties", "properties", "propertyNames"]
    description: "Validate object structure constraints"

  composition:
    enabled: true
    keywords: ["oneOf", "anyOf", "allOf"]
    description: "Validate schema composition"

  dependencies:
    enabled: true
    keywords: ["dependentRequired", "dependentSchemas"]
    description: "Validate field dependencies"

  data_types:
    enabled: true
    keywords: ["type", "format"]
    description: "Validate data types and formats"

# Schemathesis Configuration
schemathesis:
  enabled: true
  max_examples: 100
  hypothesis_phases:
    - generate
    - target
  stateful_testing: true
  base_url_override: null  # Use API base_url if null
  auth_header: "Authorization"
  auth_prefix: "APIToken"

# Reconciliation Settings
reconciliation:
  priority:
    - existing  # Use existing spec constraint if valid
    - discovery # Use discovered live API behavior
    - inferred  # Infer from patterns
  fix_strategies:
    tighter_spec: "relax"      # Spec stricter than API → relax constraint
    looser_spec: "tighten"     # Spec looser than API → tighten constraint
    missing_constraint: "add"   # Spec missing constraint → add it
    extra_constraint: "remove"  # Spec has constraint API ignores → remove it
  schema_renames:
    - old_name: routeRouteType
      new_name: operateRouteRouteType
      file_pattern: "operate.route"
      reason: "ves.io.schema.operate.route.RouteType collides with ves.io.schema.route.RouteType"
  deprecated_path_removals:
    - path: "/api/config/namespaces/{namespace}/api_definitions/{name}/http_loadbalancers"
      replacement: "/api/config/namespaces/{namespace}/api_definitions/{name}/loadbalancers"
      reason: "DEPRECATED in source description — use GetReferencingLoadBalancers"

# Report Generation
reports:
  output_dir: "reports"
  formats:
    - json
    - html
    - markdown
  include_examples: true
  max_examples_per_issue: 5

# Release Configuration
release:
  output_dir: "release"
  include_changelog: true
  include_validation_report: true
  version_from: "git"  # git tag or manual

# Spectral OAS3 Linting Configuration
spectral:
  enabled: true
  ruleset: "spectral-pipeline.yaml"
  auto_fix:
    oas3-api-servers: true
    info-contact: true
    operation-tags: true
    oas3-unused-component: true
    operation-operationId-unique: true
    oas3-valid-schema-example: true
    no-script-tags-in-markdown: true
  gate:
    max_errors: 0
    max_warnings: null
  contact:
    name: "F5 Distributed Cloud"
    url: "https://docs.cloud.f5.com"
    email: "support@f5.com"
  servers:
    - url: "https://{tenant}.console.ves.volterra.io"
      description: "F5 Distributed Cloud API"
      variables:
        tenant:
          default: "example-tenant"
          description: "Your F5 XC tenant name"
  security_scheme:
    type: "apiKey"
    in: "header"
    name: "Authorization"
    description: "F5 XC API Token (format: APIToken <token>)"

# OAS3 Transform Pipeline Configuration
transform:
  output_dir: "specs/transformed"
  enabled: true
  transforms:
    inject_info_version: true
    inject_contact: true
    inject_servers: true
    inject_security_schemes: true
    inject_operation_tags: true
    deduplicate_operation_ids: true
    strip_script_tags: true
    fix_invalid_examples: true
    rename_colliding_schemas: true
    remove_deprecated_paths: true
    mark_deprecated_operations: true
    remove_unused_schemas: true
    inject_operation_descriptions: true
