# Spelling corrections for F5 XC OpenAPI spec description/summary/title fields.
# Applied by the fix_spelling transform during `make transform`.
#
# Source: codespell audit of 268 released specs (2026-06-09).
# Each entry maps a misspelled word to its correction.
# Corrections are case-sensitive and applied as whole-word replacements
# within JSON string values only.

corrections:
  # --- High frequency (>= 10 occurrences) ---
  referrred: referred
  Validtion: Validation
  succeded: succeeded
  Neworks: Networks
  conects: connects
  expresssions: expressions
  nework: network

  # --- Medium frequency (2-9 occurrences) ---
  Addresss: Address
  addres: address
  addresse: addresses
  addressses: addresses
  Assciations: Associations
  assocaited: associated
  assosciation: association
  Avarage: Average
  bellow: below
  Cahce: Cache
  cahce: cache
  Certficate: Certificate
  configuation: configuration
  configurred: configured
  contol: control
  detination: destination
  domian: domain
  emtpy: empty
  formating: formatting
  Maximun: Maximum
  namesapce: namespace
  positve: positive
  prefered: preferred
  Refernce: Reference
  refering: referring
  reponse: response
  Reponse: Response
  resturn: return
  senstive: sensitive
  Serice: Service
  Souce: Source
  Subsciption: Subscription
  sucess: success
  uprade: upgrade
  verfication: verification
  withing: within
  accociated: associated
  condigures: configures
  programed: programmed

  # --- Low frequency (1 occurrence) ---
  acccess: access
  assgined: assigned
  assigments: assignments
