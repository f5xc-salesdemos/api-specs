  enviroment: environment
  exising: existing
  fileystem: filesystem
  followig: following
  idenfify: identify
  inclusing: including
  indentified: identified
  infomation: information
  Insatnce: Instance
  intiated: initiated
  managment: management
  Manangement: Management
  mechanims: mechanisms
  multple: multiple
  Newtork: Network
  oberved: observed
  objec: object
  paramters: parameters
  Probablity: Probability
  procotol: protocol
