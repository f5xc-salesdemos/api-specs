# Words that codespell flags but are NOT typos in this context.
# These must not be corrected.
false_positives:
  - notin       # BNF keyword in Kubernetes label selector syntax
  - NotIn       # Same as above, capitalized variant
  - OT          # Substring of enum values (ENOTFOUND, STATUS_DO_NOT_PUBLISH)
  - requestor   # Legitimate alternate spelling
  - thats       # Contraction without apostrophe, common in API descriptions
  - eventhough  # Compound word, context-dependent
  - pathes      # May be intentional in some API contexts
  - re-use      # Hyphenated form is acceptable
  - re-used     # Hyphenated form is acceptable
  - implementors  # Acceptable variant of implementers
