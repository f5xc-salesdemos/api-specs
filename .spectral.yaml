extends:
  - "spectral:oas"

rules:
  # F5 XC APIs use dotted parameter names (metadata.namespace, metadata.name)
  # which Spectral's built-in path-params rule incorrectly flags.
  # Disable it here; our pipeline uses spectral-pipeline.yaml with a custom
  # f5-path-params function for accurate validation.
  path-params: off

  # Auto-fixable rules - keep enabled at warn for discovery
  operation-tags: warn
  oas3-api-servers: warn
  info-contact: warn
  oas3-unused-component: warn
  operation-operationId-unique: error
  oas3-valid-schema-example: error
  no-script-tags-in-markdown: warn

  # Not auto-fixable - downgrade to info
  operation-description: info
  info-description: info
